<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/jarvis/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JARVIS | Home Control</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
      
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      
      :root {
        --bg: #0a0a0f;
        --bg-panel: #12121a;
        --bg-card: #1a1a24;
        --bg-hover: #252532;
        --text: #e8e8f0;
        --text-mid: #a0a0b0;
        --text-dim: #606070;
        --accent: #00d4ff;
        --accent-dim: #0088aa;
        --success: #00ff88;
        --warning: #ffaa00;
        --danger: #ff4444;
        --border: #2a2a3a;
      }
      
      body {
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow: hidden;
      }
      
      .grid-bg {
        position: fixed;
        inset: 0;
        background-image: 
          linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      
      .glow {
        position: fixed;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }
      
      .glow-1 { top: -200px; left: -200px; }
      .glow-2 { bottom: -200px; right: -200px; background: radial-gradient(circle, rgba(0,255,136,0.1) 0%, transparent 70%); }
    </style>
  </head>
  <body>
    <div class="grid-bg"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div id="root"></div>
    
    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback } = React;
      
      // ============ CONFIGURATION ============
      const CONFIG = {
        // Update this with your Cloudflare Tunnel or ngrok URL
        // When tunnel is running, e.g.: "https://your-tunnel.trycloudflare.com"
        BRIDGE_URL: localStorage.getItem('jarvis_bridge_url') || '',
        MIDI_DEVICE_NAME: 'Launchpad Mini MK3'
      };
      
      // ============ STYLES ============
      const styles = {
        container: {
          position: 'relative',
          zIndex: 1,
          height: '100vh',
          display: 'flex',
          flexDirection: 'column',
          padding: '20px',
          gap: '16px'
        },
        header: {
          display: 'flex',
          justifyContent: 'space-between',
          alignItems: 'center',
          padding: '16px 24px',
          background: 'rgba(18,18,26,0.8)',
          backdropFilter: 'blur(10px)',
          borderRadius: '16px',
          border: '1px solid var(--border)'
        },
        title: {
          fontSize: '24px',
          fontWeight: 700,
          background: 'linear-gradient(135deg, #00d4ff, #00ff88)',
          WebkitBackgroundClip: 'text',
          WebkitTextFillColor: 'transparent',
          letterSpacing: '4px'
        },
        statusBadge: (connected) => ({
          display: 'flex',
          alignItems: 'center',
          gap: '8px',
          padding: '8px 16px',
          background: connected ? 'rgba(0,255,136,0.1)' : 'rgba(255,68,68,0.1)',
          border: `1px solid ${connected ? 'var(--success)' : 'var(--danger)'}`,
          borderRadius: '8px',
          fontSize: '12px',
          fontWeight: 600,
          color: connected ? 'var(--success)' : 'var(--danger)'
        }),
        main: {
          flex: 1,
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fit, minmax(350px, 1fr))',
          gap: '16px',
          overflow: 'auto'
        },
        card: {
          background: 'rgba(26,26,36,0.8)',
          backdropFilter: 'blur(10px)',
          borderRadius: '16px',
          border: '1px solid var(--border)',
          padding: '20px',
          display: 'flex',
          flexDirection: 'column',
          gap: '16px'
        },
        cardTitle: {
          fontSize: '14px',
          fontWeight: 600,
          color: 'var(--text-mid)',
          textTransform: 'uppercase',
          letterSpacing: '2px',
          display: 'flex',
          alignItems: 'center',
          gap: '10px'
        },
        deviceGrid: {
          display: 'grid',
          gridTemplateColumns: 'repeat(2, 1fr)',
          gap: '12px'
        },
        deviceCard: (isOn) => ({
          padding: '16px',
          background: isOn ? 'rgba(0,212,255,0.15)' : 'var(--bg-panel)',
          border: `2px solid ${isOn ? 'var(--accent)' : 'var(--border)'}`,
          borderRadius: '12px',
          cursor: 'pointer',
          transition: 'all 0.2s',
          display: 'flex',
          flexDirection: 'column',
          gap: '8px'
        }),
        deviceIcon: {
          fontSize: '24px',
          color: 'var(--accent)'
        },
        deviceName: {
          fontSize: '13px',
          fontWeight: 500,
          color: 'var(--text)'
        },
        deviceStatus: (isOn) => ({
          fontSize: '11px',
          color: isOn ? 'var(--success)' : 'var(--text-dim)'
        }),
        midiPad: {
          display: 'grid',
          gridTemplateColumns: 'repeat(8, 1fr)',
          gap: '4px',
          aspectRatio: '1',
          maxWidth: '400px',
          margin: '0 auto'
        },
        pad: (isActive, color) => ({
          aspectRatio: '1',
          borderRadius: '4px',
          border: 'none',
          cursor: 'pointer',
          background: isActive ? (color || 'var(--accent)') : 'var(--bg-panel)',
          boxShadow: isActive ? `0 0 10px ${color || 'var(--accent)'}` : 'none',
          transition: 'all 0.1s'
        }),
        log: {
          flex: 1,
          background: 'var(--bg-panel)',
          borderRadius: '8px',
          padding: '12px',
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: '11px',
          overflow: 'auto',
          maxHeight: '200px'
        },
        logEntry: (type) => ({
          color: type === 'error' ? 'var(--danger)' : 
                 type === 'success' ? 'var(--success)' : 
                 type === 'midi' ? 'var(--accent)' : 'var(--text-mid)',
          marginBottom: '4px'
        }),
        button: {
          padding: '12px 24px',
          background: 'var(--accent)',
          color: 'var(--bg)',
          border: 'none',
          borderRadius: '8px',
          fontWeight: 600,
          cursor: 'pointer',
          transition: 'all 0.2s'
        },
        input: {
          padding: '10px 16px',
          background: 'var(--bg-panel)',
          border: '1px solid var(--border)',
          borderRadius: '8px',
          color: 'var(--text)',
          fontSize: '13px',
          width: '100%'
        }
      };
      
      // ============ COMPONENTS ============
      
      function StatusIndicator({ connected, label }) {
        return (
          <div style={styles.statusBadge(connected)}>
            <i className={`fas fa-circle ${connected ? 'fa-beat' : ''}`} style={{ fontSize: '8px' }}></i>
            {label}: {connected ? 'Connected' : 'Disconnected'}
          </div>
        );
      }
      
      function DeviceCard({ device, onToggle }) {
        return (
          <div 
            style={styles.deviceCard(device.isOn)}
            onClick={() => onToggle(device.id)}
          >
            <i className={`fas fa-${device.icon || 'lightbulb'}`} style={styles.deviceIcon}></i>
            <span style={styles.deviceName}>{device.name}</span>
            <span style={styles.deviceStatus(device.isOn)}>
              {device.isOn ? 'ON' : 'OFF'}
            </span>
          </div>
        );
      }
      
      // Device fader component for left side
      function FaderColumn({ colIndex, activePads, onPadPress, deviceName }) {
        return (
          <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
            {Array.from({ length: 8 }, (_, row) => {
              // Launchpad note index: (7-row) * 8 + col
              const note = (7 - row) * 8 + colIndex;
              const isActive = activePads.includes(note);
              // CC for this fader position
              const cc = colIndex * 8 + row;
              
              return (
                <button
                  key={row}
                  style={{
                    ...styles.pad(isActive, isActive ? '#00d4ff' : null),
                    width: '40px',
                    height: '40px'
                  }}
                  onMouseDown={() => onPadPress(note, true, 'cc', cc)}
                  onMouseUp={() => onPadPress(note, false)}
                  onMouseLeave={() => onPadPress(note, false)}
                  title={`${deviceName} - CC ${cc}`}
                />
              );
            })}
          </div>
        );
      }
      
      // Color button component
      function ColorButton({ note, color, isActive, onPress, colorName }) {
        const colorMap = {
          'red': '#ff4444',
          'orange': '#ff8800',
          'yellow': '#ffdd00',
          'light_green': '#88ff00',
          'dark_green': '#00aa44',
          'light_blue': '#00ddff',
          'dark_blue': '#0044aa',
          'pink': '#ff44aa',
          'white': '#ffffff'
        };
        
        return (
          <button
            style={{
              ...styles.pad(isActive, colorMap[color] || color),
              width: '40px',
              height: '40px'
            }}
            onMouseDown={() => onPress(note, true, 'note')}
            onMouseUp={() => onPress(note, false)}
            onMouseLeave={() => onPress(note, false)}
            title={colorName}
          />
        );
      }
      
      // App launcher button
      function AppButton({ note, isActive, onPress, appName }) {
        return (
          <button
            style={{
              ...styles.pad(isActive, isActive ? '#00ff88' : '#2a2a3a'),
              width: '40px',
              height: '40px',
              fontSize: '10px',
              color: isActive ? '#000' : '#fff'
            }}
            onMouseDown={() => onPress(note, true, 'note')}
            onMouseUp={() => onPress(note, false)}
            onMouseLeave={() => onPress(note, false)}
            title={appName}
          >
            {appName?.substring(0, 2)}
          </button>
        );
      }
      
      // Main Launchpad layout matching midicontrol
      function MIDIPad({ activePads, onPadPress }) {
        // Color layout for right side (9 colors in 5 rows x 4 cols, but we show 5)
        const colors = [
          ['red', 'red', 'red', 'red'],
          ['orange', 'orange', 'orange', 'orange'],
          ['yellow', 'yellow', 'yellow', 'yellow'],
          ['light_green', 'light_green', 'light_green', 'light_green'],
          ['dark_green', 'dark_green', 'dark_green', 'dark_green']
        ];
        
        // App names for bottom row
        const apps = ['Discord', 'Firefox', 'Steam', 'OBS', 'Spotify', 'VS Code', 'Terminal', 'File'];
        
        return (
          <div style={{ display: 'flex', gap: '8px', alignItems: 'flex-start' }}>
            {/* LEFT HALF - 4 Faders */}
            <div style={{ display: 'flex', gap: '4px' }}>
              <FaderColumn colIndex={0} activePads={activePads} onPadPress={onPadPress} deviceName="Light 1" />
              <FaderColumn colIndex={1} activePads={activePads} onPadPress={onPadPress} deviceName="Light 2" />
              <FaderColumn colIndex={2} activePads={activePads} onPadPress={onPadPress} deviceName="Strip 1" />
              <FaderColumn colIndex={3} activePads={activePads} onPadPress={onPadPress} deviceName="Strip 2" />
            </div>
            
            {/* Divider */}
            <div style={{ width: '2px', background: 'var(--border)', margin: '0 8px' }} />
            
            {/* RIGHT HALF - Colors + Controls + Apps */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
              {/* Rows 0-4: Color buttons (9 colors mapped to 5 rows) */}
              {colors.map((rowColors, row) => (
                <div key={row} style={{ display: 'flex', gap: '4px' }}>
                  {rowColors.map((color, col) => {
                    const colIndex = 4 + col;
                    const note = (7 - row) * 8 + colIndex;
                    return (
                      <ColorButton
                        key={col}
                        note={note}
                        color={color}
                        isActive={activePads.includes(note)}
                        onPress={onPadPress}
                        colorName={color}
                      />
                    );
                  })}
                </div>
              ))}
              
              {/* Row 5: Master brightness (4) + gap + Volume (2) */}
              <div style={{ display: 'flex', gap: '4px' }}>
                {/* Master brightness - columns 0-3 */}
                {[0, 1, 2, 3].map(col => {
                  const note = 2 * 8 + col; // Row 5
                  return (
                    <button
                      key={col}
                      style={{
                        ...styles.pad(activePads.includes(note), '#ffaa00'),
                        width: '40px',
                        height: '40px'
                      }}
                      onMouseDown={() => onPadPress(note, true, 'cc', col)}
                      onMouseUp={() => onPadPress(note, false)}
                      title={`Master ${col + 1}`}
                    />
                  );
                })}
                {/* Gap */}
                <div style={{ width: '44px' }} />
                {/* Volume down/up */}
                {[6, 7].map((col, i) => {
                  const note = 2 * 8 + col;
                  return (
                    <button
                      key={col}
                      style={{
                        ...styles.pad(activePads.includes(note), i === 0 ? '#ff4444' : '#00ff88'),
                        width: '40px',
                        height: '40px',
                        fontSize: '12px'
                      }}
                      onMouseDown={() => onPadPress(note, true, 'cc', i === 0 ? 102 : 103)}
                      onMouseUp={() => onPadPress(note, false)}
                      title={i === 0 ? 'Vol -' : 'Vol +'}
                    >
                      {i === 0 ? '-' : '+'}
                    </button>
                  );
                })}
              </div>
              
              {/* Rows 6-7: App launchers */}
              {[1, 0].map(row => (
                <div key={row} style={{ display: 'flex', gap: '4px' }}>
                  {[4, 5, 6, 7].map((col, i) => {
                    const note = row * 8 + col;
                    const appIndex = (1 - row) * 4 + (col - 4);
                    return (
                      <AppButton
                        key={col}
                        note={note}
                        isActive={activePads.includes(note)}
                        onPress={onPadPress}
                        appName={apps[appIndex]}
                      />
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        );
      }
      
      function LogPanel({ logs }) {
        const logEndRef = useRef(null);
        
        useEffect(() => {
          logEndRef.current?.scrollIntoView({ behavior: 'smooth' });
        }, [logs]);
        
        return (
          <div style={styles.log}>
            {logs.map((log, i) => (
              <div key={i} style={styles.logEntry(log.type)}>
                [{new Date(log.time).toLocaleTimeString()}] {log.message}
              </div>
            ))}
            <div ref={logEndRef} />
          </div>
        );
      }
      
      // ============ MAIN APP ============
      
      function App() {
        const [midiAccess, setMidiAccess] = useState(null);
        const [midiConnected, setMidiConnected] = useState(false);
        const [midiInputs, setMidiInputs] = useState([]);
        const [selectedMidiDevice, setSelectedMidiDevice] = useState('');
        const [bridgeConnected, setBridgeConnected] = useState(false);
        const [devices, setDevices] = useState([]);
        const [activePads, setActivePads] = useState([]);
        const [logs, setLogs] = useState([]);
        const [bridgeUrl, setBridgeUrl] = useState(CONFIG.BRIDGE_URL);
        const [showConfig, setShowConfig] = useState(false);
        
        const addLog = useCallback((message, type = 'info') => {
          setLogs(prev => [...prev.slice(-50), { message, type, time: Date.now() }]);
        }, []);
        
        // Initialize MIDI
        useEffect(() => {
          if (navigator.requestMIDIAccess) {
            navigator.requestMIDIAccess({ sysex: true })
              .then(access => {
                setMidiAccess(access);
                addLog('MIDI Access granted', 'success');
                
                // Get all MIDI inputs
                const inputs = Array.from(access.inputs.values());
                setMidiInputs(inputs);
                
                // Find Launchpad
                const launchpad = inputs.find(i => 
                  i.name?.toLowerCase().includes('launchpad')
                );
                
                if (launchpad) {
                  setSelectedMidiDevice(launchpad.id);
                  setupMidiDevice(launchpad);
                } else if (inputs.length > 0) {
                  // Default to first device if no Launchpad
                  setSelectedMidiDevice(inputs[0].id);
                  setupMidiDevice(inputs[0]);
                }
                
                // Watch for device changes
                access.onstatechange = (e) => {
                  addLog(`MIDI device ${e.port.state}: ${e.port.name}`, 'info');
                  if (e.port.type === 'input') {
                    const newInputs = Array.from(access.inputs.values());
                    setMidiInputs(newInputs);
                    setMidiConnected(e.port.state === 'connected');
                  }
                };
              })
              .catch(err => {
                addLog('MIDI Access denied: ' + err.message, 'error');
              });
          } else {
            addLog('Web MIDI API not supported in this browser', 'error');
          }
        }, []);
        
        // Setup MIDI device
        const setupMidiDevice = (input) => {
          input.onmidimessage = handleMIDIMessage;
          setMidiConnected(true);
          addLog(`Connected: ${input.name}`, 'success');
          
          if (input.name?.toLowerCase().includes('launchpad')) {
            // Enter programmer mode for Launchpad
            sendLaunchpadSysEx([0, 32, 41, 2, 13, 14, 1]);
          }
        };
        
        // Handle MIDI device selection change
        const handleMidiDeviceChange = (deviceId) => {
          setSelectedMidiDevice(deviceId);
          
          // Disconnect old inputs
          midiInputs.forEach(input => {
            input.onmidimessage = null;
          });
          
          // Connect new device
          const device = midiInputs.find(i => i.id === deviceId);
          if (device) {
            setupMidiDevice(device);
          }
        };
        
        // Send SysEx to Launchpad
        const sendLaunchpadSysEx = useCallback((data) => {
          if (!midiAccess) return;
          
          const output = Array.from(midiAccess.outputs.values())
            .find(out => out.name?.includes('Launchpad'));
          
          if (output) {
            output.send([0xF0, ...data, 0xF7]);
          }
        }, [midiAccess]);
        
        // Handle incoming MIDI messages matching layout_mapper.py
        const handleMIDIMessage = useCallback((event) => {
          const [status, data1, data2] = event.data;
          const messageType = status & 0xF0;
          const channel = (status & 0x0F) + 1; // Convert to 1-based channel (1-16)
          
          // CC messages (faders and colors from layout_mapper.py)
          if (messageType === 0xB0) { // Control Change
            const cc = data1;
            const value = data2;
            
            addLog(`CC ${channel}:${cc} = ${value}`, 'midi');
            
            // Channel 1: Left half brightness faders (cols 0-3)
            // Layout: 8 rows per column, so CC mapping is:
            // Col 0: CC 1-8, Col 1: CC 9-16, Col 2: CC 17-24, Col 3: CC 25-32
            if (channel === 1 && cc >= 1 && cc <= 32) {
              const col = Math.floor((cc - 1) / 8); // 0-3
              const row = (cc - 1) % 8; // 0-7 (top to bottom)
              const deviceIndex = col; // 0-3 = light1, light2, strip1, strip2
              const device = devices[deviceIndex];
              
              if (device) {
                const brightness = Math.round((value / 127) * 100);
                addLog(`${device.name} brightness: ${brightness}%`, 'info');
                // Could send brightness control to bridge here
              }
            }
            // Channel 2: Right half colors (cols 4-7)
            // Layout: CC 1-20 for colors (rows 0-4, 2 buttons per device per color)
            else if (channel === 2 && cc >= 1 && cc <= 20) {
              const colorIndex = Math.floor((cc - 1) / 4); // 0-4 = red, orange, yellow, light_green, dark_green
              const deviceInPair = (cc - 1) % 2; // 0 or 1 within the pair
              const colGroup = Math.floor(((cc - 1) % 4) / 2); // 0 = cols 4-5 (light1, light2), 1 = cols 6-7 (strip1, strip2)
              
              const colors = ['red', 'orange', 'yellow', 'light_green', 'dark_green'];
              const colorName = colors[colorIndex] || 'unknown';
              
              addLog(`Color: ${colorName} (Ch${channel}:CC${cc})`, 'info');
            }
            // Volume and master brightness (CC 21-24)
            else if (channel === 1 && cc >= 21 && cc <= 24) {
              if (cc === 21) addLog('Volume Down', 'midi');
              else if (cc === 22) addLog('Volume Up', 'midi');
              else if (cc === 23 || cc === 24) addLog(`Master Brightness ${cc - 22}`, 'midi');
            }
          }
          // Note messages (bottom row device toggles)
          else if (messageType === 0x90) { // Note On
            const note = data1;
            const velocity = data2;
            
            if (velocity > 0) {
              addLog(`Note: ${note} (Ch${channel})`, 'midi');
              setActivePads(prev => [...prev, note]);
              
              // Bottom row (notes 0-7) = device toggles
              if (note >= 0 && note <= 3) {
                const deviceIndex = note;
                if (devices[deviceIndex]) {
                  controlDevice(devices[deviceIndex].id, !devices[deviceIndex].isOn);
                }
              }
              
              lightUpPad(note, velocity);
            } else {
              setActivePads(prev => prev.filter(p => p !== note));
            }
          } else if (messageType === 0x80) { // Note Off
            setActivePads(prev => prev.filter(p => p !== data1));
          }
        }, [devices]);
        
        // Light up Launchpad LED
        const lightUpPad = useCallback((note, velocity = 127) => {
          const output = Array.from(midiAccess?.outputs.values() || [])
            .find(out => out.name?.includes('Launchpad'));
          
          if (output) {
            // Novation Launchpad LED message format
            // 0x90 = note on, note number, color/velocity
            const color = velocity > 0 ? 0x3F : 0x00; // Bright cyan or off
            output.send([0x90, note, color]);
          }
        }, [midiAccess]);
        
        // Control device via bridge
        const controlDevice = useCallback(async (deviceId, turnOn) => {
          if (!bridgeUrl) {
            addLog('Bridge URL not configured', 'error');
            return;
          }
          
          try {
            const response = await fetch(`${bridgeUrl}/api/device/${deviceId}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ state: turnOn })
            });
            
            if (response.ok) {
              addLog(`Device ${deviceId} turned ${turnOn ? 'ON' : 'OFF'}`, 'success');
              // Update local state
              setDevices(prev => prev.map(d => 
                d.id === deviceId ? { ...d, isOn: turnOn } : d
              ));
            } else {
              addLog(`Failed to control device ${deviceId}`, 'error');
            }
          } catch (err) {
            addLog(`Bridge error: ${err.message}`, 'error');
            setBridgeConnected(false);
          }
        }, [bridgeUrl]);
        
        // Scan for devices
        const scanDevices = useCallback(async () => {
          if (!bridgeUrl) {
            addLog('Bridge URL not configured', 'error');
            return;
          }
          
          addLog('Scanning for devices...', 'info');
          
          try {
            const response = await fetch(`${bridgeUrl}/api/devices`);
            if (response.ok) {
              const data = await response.json();
              setDevices(data.devices || []);
              setBridgeConnected(true);
              addLog(`Found ${data.devices?.length || 0} devices`, 'success');
            } else {
              addLog('Failed to scan devices', 'error');
              setBridgeConnected(false);
            }
          } catch (err) {
            addLog(`Bridge connection failed: ${err.message}`, 'error');
            setBridgeConnected(false);
          }
        }, [bridgeUrl]);
        
        // Auto-scan when bridge URL is set
        useEffect(() => {
          if (bridgeUrl) {
            scanDevices();
            const interval = setInterval(scanDevices, 30000); // Refresh every 30s
            return () => clearInterval(interval);
          }
        }, [bridgeUrl, scanDevices]);
        
        // Save bridge URL
        const saveBridgeUrl = () => {
          localStorage.setItem('jarvis_bridge_url', bridgeUrl);
          CONFIG.BRIDGE_URL = bridgeUrl;
          addLog('Bridge URL saved', 'success');
          scanDevices();
        };
        
        // Handle virtual pad press (from UI) - sends channel:CC matching layout_mapper.py
        const sendVirtualCC = (channel, cc, value = 127) => {
          addLog(`Virtual: Ch${channel}:CC${cc} = ${value}`, 'midi');
          
          // Channel 1 CC 1-32: Brightness faders
          if (channel === 1 && cc >= 1 && cc <= 32) {
            const col = Math.floor((cc - 1) / 8);
            const device = devices[col];
            if (device) {
              const brightness = Math.round((value / 127) * 100);
              addLog(`${device.name} brightness: ${brightness}%`, 'info');
            }
          }
          // Channel 2 CC 1-20: Colors
          else if (channel === 2 && cc >= 1 && cc <= 20) {
            const colorIndex = Math.floor((cc - 1) / 4);
            const colors = ['red', 'orange', 'yellow', 'light_green', 'dark_green'];
            addLog(`Color: ${colors[colorIndex] || 'unknown'}`, 'info');
          }
          // Volume/Master
          else if (channel === 1 && cc === 102) addLog('Volume Down', 'midi');
          else if (channel === 1 && cc === 103) addLog('Volume Up', 'midi');
        };
        
        // Handle virtual pad press
        const handlePadPress = (note, isPressed, messageType = 'note', extraData = null) => {
          if (isPressed) {
            addLog(`Virtual pad: note ${note}`, 'midi');
            setActivePads(prev => [...prev, note]);
            
            // Check column
            const col = note % 8;
            const row = Math.floor(note / 8);
            
            // Left half (cols 0-3) - bottom row is device toggle
            if (col < 4 && row === 0) {
              const deviceIndex = col;
              if (devices[deviceIndex]) {
                controlDevice(devices[deviceIndex].id, !devices[deviceIndex].isOn);
              }
            }
            // Left half - faders use CC on channel 1
            else if (col < 4 && row > 0) {
              // CC = col*8 + row (inverted for bottom-up)
              const cc = col * 8 + (7 - row);
              sendVirtualCC(1, cc + 1);
            }
            // Right half - colors use CC on channel 2
            else if (col >= 4 && row >= 3) { // Top 5 rows are colors
              const rightCol = col - 4; // 0-3
              const colorRow = 7 - row; // 0-4
              const cc = colorRow * 4 + rightCol + 1;
              sendVirtualCC(2, cc);
            }
            // Volume buttons (row 2, cols 6-7)
            else if (row === 2 && col === 6) sendVirtualCC(1, 102);
            else if (row === 2 && col === 7) sendVirtualCC(1, 103);
            
            // Light up the physical pad if Launchpad connected
            lightUpPad(note, 127);
          } else {
            setActivePads(prev => prev.filter(p => p !== note));
          }
        };
        
        return (
          <div style={styles.container}>
            {/* Header */}
            <header style={styles.header}>
              <div style={styles.title}>JARVIS</div>
              <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>
                {/* MIDI Device Selector */}
                {midiInputs.length > 0 && (
                  <select 
                    value={selectedMidiDevice}
                    onChange={(e) => handleMidiDeviceChange(e.target.value)}
                    style={{
                      padding: '8px 12px',
                      background: 'var(--bg-panel)',
                      border: '1px solid var(--border)',
                      borderRadius: '8px',
                      color: 'var(--text)',
                      fontSize: '12px',
                      cursor: 'pointer'
                    }}
                  >
                    {midiInputs.map(input => (
                      <option key={input.id} value={input.id}>
                        🎹 {input.name}
                      </option>
                    ))}
                  </select>
                )}
                <StatusIndicator 
                  connected={midiConnected} 
                  label="MIDI" 
                />
                <StatusIndicator 
                  connected={bridgeConnected} 
                  label="Bridge" 
                />
                <button
                  style={{...styles.button, padding: '8px 16px'}}
                  onClick={() => setShowConfig(!showConfig)}
                >
                  <i className="fas fa-cog"></i>
                </button>
              </div>
            </header>
            
            {/* Configuration Panel */}
            {showConfig && (
              <div style={styles.card}>
                <div style={styles.cardTitle}>
                  <i className="fas fa-network-wired"></i>
                  Bridge Configuration
                </div>
                <div style={{ display: 'flex', gap: '12px' }}>
                  <input
                    type="text"
                    placeholder="https://your-tunnel.trycloudflare.com"
                    value={bridgeUrl}
                    onChange={(e) => setBridgeUrl(e.target.value)}
                    style={styles.input}
                  />
                  <button style={styles.button} onClick={saveBridgeUrl}>
                    Save
                  </button>
                </div>
                <p style={{ fontSize: '12px', color: 'var(--text-dim)' }}>
                  Enter your Cloudflare Tunnel or ngrok URL here. Run <code>cloudflared tunnel --url http://localhost:5000</code> on your PC.
                </p>
              </div>
            )}
            
            {/* Main Grid */}
            <main style={styles.main}>
              {/* Devices Panel */}
              <div style={styles.card}>
                <div style={styles.cardTitle}>
                  <i className="fas fa-home"></i>
                  Smart Devices
                  <button 
                    style={{...styles.button, padding: '6px 12px', fontSize: '11px', marginLeft: 'auto'}}
                    onClick={scanDevices}
                  >
                    <i className="fas fa-sync"></i> Scan
                  </button>
                </div>
                <div style={styles.deviceGrid}>
                  {devices.length === 0 ? (
                    <div style={{ gridColumn: '1/-1', textAlign: 'center', color: 'var(--text-dim)', padding: '40px' }}>
                      {bridgeUrl ? 'No devices found. Click Scan to search.' : 'Configure bridge URL to connect to devices.'}
                    </div>
                  ) : (
                    devices.map(device => (
                      <DeviceCard 
                        key={device.id} 
                        device={device} 
                        onToggle={(id) => controlDevice(id, !device.isOn)}
                      />
                    ))
                  )}
                </div>
              </div>
              
              {/* MIDI Visualizer */}
              <div style={styles.card}>
                <div style={styles.cardTitle}>
                  <i className="fas fa-th"></i>
                  Launchpad Visualizer
                </div>
                <MIDIPad activePads={activePads} onPadPress={handlePadPress} />
                <p style={{ fontSize: '11px', color: 'var(--text-dim)', textAlign: 'center' }}>
                  Click pads or use your physical Launchpad Mini MK3
                </p>
              </div>
              
              {/* Activity Log */}
              <div style={{ ...styles.card, gridColumn: '1 / -1' }}>
                <div style={styles.cardTitle}>
                  <i className="fas fa-terminal"></i>
                  Activity Log
                </div>
                <LogPanel logs={logs} />
              </div>
            </main>
          </div>
        );
      }
      
      // Render
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
